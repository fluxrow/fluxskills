name: Validate Skills & Workflows

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'workflows/**'
      - 'schema/**'
      - 'scripts/**'
      - '.github/workflows/validate.yml'
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'workflows/**'
      - 'schema/**'
      - 'scripts/**'
      - '.github/workflows/validate.yml'

permissions:
  contents: read

jobs:
  validate:
    name: Schema validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install validator dependencies
        run: npm install --no-save --no-audit --no-fund ajv@8

      - name: Check JSON syntax
        run: |
          set -e
          fail=0
          for f in $(find skills workflows schema -name '*.json' 2>/dev/null); do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null; then
              echo "::error file=$f::Invalid JSON syntax"
              fail=1
            fi
          done
          exit $fail

      - name: Validate schemas
        run: node scripts/validate-schema.cjs
