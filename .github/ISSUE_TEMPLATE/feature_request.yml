name: ✨ Feature request
description: Suggest an improvement to an existing skill or workflow
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make FluxSkills better? Tell us about it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear description of the problem or limitation you're facing.
      placeholder: When I use SKILL-X for Y, it doesn't handle Z well...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Dev
        - QA
        - Marketing
        - Ops
        - All categories
        - Not sure
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or examples that help explain the request.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
